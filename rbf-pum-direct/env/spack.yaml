spack:
  definitions:
    - compilers: [gcc@13.4.0]
    - packages:
        - cmake@3.31
        - ninja
        - vtk ~opengl2 ~mpi
        - py-numpy
        - py-scipy
        - kokkos@5.0.0 cxxstd=20 +cuda cuda_arch=80 +hwloc +tuning +wrapper +openmp +serial +cuda_constexpr +cuda_lambda +numactl ~ipo
        - kokkos-kernels@5.0.0 +cuda cuda_arch=80 +execspace_cuda +execspace_openmp +execspace_serial +openmp +serial ~ipo
        - arborx@2.0.1 +cuda cuda_arch=80 cxxstd=20 +mpi +openmp +serial ~ipo
  concretizer:
    unify: true

  specs:
    - gcc@13.4.0 +binutils
    - compiler-wrapper@1.0
    - cuda@12.9.0 +dev
    - py-meshio
    - matrix:
        - [$packages]
        - [$%compilers]

  packages:
    all:
      require: arch=linux-rhel8-zen3
